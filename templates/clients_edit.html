{% extends "layout.html" %}

{% block title %}{{ t('clients.edit_client') }} - {{ t('app.name') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">{{ t('clients.edit_client') }}</h1>
    <p class="text-sm text-gray-500 mt-1 font-mono">{{ peer.get('public-key', '') }}</p>
  </div>

  <div class="bg-white/80 backdrop-blur-lg rounded border border-gray-300 overflow-hidden">
    <form method="POST" action="{{ url_for('clients_update') }}" class="p-8 space-y-6">
      <input type="hidden" name="peer_id" value="{{ peer['.id'] }}">
      <input type="hidden" name="interface" value="{{ back_interface or peer.get('interface', '') }}">

      <div class="wg-form-group">
        <label class="wg-label">{{ t('clients.fields.name') }}</label>
        <input type="text" name="name"
               value="{{ peer.get('name', '') }}"
               class="wg-input">
      </div>

      <div class="wg-form-group">
        <label class="wg-label">{{ t('clients.fields.comment') }}</label>
        <input type="text" name="comment"
               value="{{ peer.get('comment', '') }}"
               placeholder="{{ t('clients.fields.comment_placeholder') }}"
               class="wg-input">
      </div>

      <div class="wg-form-group">
        <label class="wg-label">{{ t('clients.fields.ip_address') }}</label>
        <input type="text" name="allowed_address"
               value="{{ peer.get('allowed-address', '') }}"
               class="wg-input font-mono">
      </div>

      <div class="wg-form-group">
        <label class="wg-label">{{ t('new_client.config_section.keepalive_label') }}</label>
        <input type="number" name="persistent_keepalive"
               value="{{ peer.get('persistent-keepalive', '').rstrip('s') }}"
               min="0" max="65535"
               class="wg-input font-mono">
      </div>

      <div class="flex gap-4 pt-2">
        <button type="submit"
                class="flex-1 wg-btn-primary py-3 font-semibold">
          {{ t('clients.save_button') }}
        </button>
        <a href="{{ url_for('clients_index', interface=back_interface) }}"
           class="flex-1 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-md text-center transition-all duration-200">
          {{ t('new_client.cancel_button') }}
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
